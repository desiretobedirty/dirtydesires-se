<p>The Ultimate Drinking Game For Couples... Swingers Edition.</p>

<button onclick="setLevel('whitetoy')" class="active">White Toy Cards</button>

</section>

</div>

</section>

<section class="controls">

<button onclick="nextCard()">Draw Card</button>
