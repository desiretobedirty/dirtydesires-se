<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dirty Desires</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div id="ageGate">
  <h1>🔞 Adults Only</h1>
  <p>You must be 18+ to play.</p>
  <button id="enterBtn">Enter</button>
</div>

<div id="mainContent">
  <h1>Dirty Desires - 'Swingers Edition'</h1>

  <div class="info">
    <p><strong>Sip, Strip & Surrender.</strong> The Ultimate Drinking Game For Swingers...</p>
  </div>

  <div class="buttons">
    <button data-category="white">White Cards</button>
    <button data-category="red">Red Cards</button>
    <button data-category="black">Black Cards</button>
    <button data-category="whitetoy">White Toy Cards</button>
    <button data-category="redtoy">Red Toy Cards</button>
    <button data-category="blacktoy">Black Toy Cards</button>
  </div>

  <div class="card-container">
    <div id="card" class="card">Pick a category</div>
  </div>

  <button id="drawBtn">Draw Card</button>
</div>

<script src="./js/app.js"></script>
</body>
</html>
